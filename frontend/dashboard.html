<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="nav">
        <a class="brand" href="index.html">Task Management</a>
        <nav class="nav-links">
          <span class="user-pill" id="whoami"></span>
          <button type="button" class="btn btn-ghost" id="logout">Logout</button>
        </nav>
      </header>
      <div id="msg" class="message" hidden></div>

      <div class="card" style="margin-bottom: 1.25rem">
        <h1>Your tasks</h1>
        <p class="sub" id="role-hint"></p>
        <form id="create-form">
          <label for="new-title">New task title</label>
          <input id="new-title" required maxlength="200" placeholder="e.g. Review API docs" />
          <label for="new-desc">Description (optional)</label>
          <textarea id="new-desc" placeholder="Details…"></textarea>
          <button type="submit" class="btn btn-primary">Add task</button>
        </form>
      </div>

      <div class="card" id="admin-tasks-card" hidden>
        <h2 style="margin: 0 0 1rem; font-size: 1.1rem">Global Administrative Tasks</h2>
        <div id="admin-tasks" class="task-list"></div>
      </div>

      <div class="card" id="user-tasks-card" hidden>
        <h2 style="margin: 1rem 0 1rem; font-size: 1.1rem">Individual User Tasks</h2>
        <div id="user-tasks" class="task-list"></div>
      </div>

      <div class="card" id="standard-tasks-card">
        <h2 style="margin: 0 0 1rem; font-size: 1.1rem">Your task list</h2>
        <div id="tasks" class="task-list"></div>
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
